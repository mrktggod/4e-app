name: API smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run API smoke
        env:
          PROD_WORKER_BASE_URL: https://edge.4-ai.site
          STAGING_WORKER_BASE_URL: https://restless-lab-d737-staging.shelckograff.workers.dev
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            WORKER_BASE_URL="$STAGING_WORKER_BASE_URL" npm run api-smoke
          else
            WORKER_BASE_URL="$PROD_WORKER_BASE_URL" npm run api-smoke
          fi
