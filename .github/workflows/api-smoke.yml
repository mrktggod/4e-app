name: API smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run API smoke
        env:
          WORKER_BASE_URL: https://edge.4-ai.site
        run: npm run api-smoke