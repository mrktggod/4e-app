<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>4 — Что 4 знает обо мне — Soft Glass Dark</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020706}
body{font-family:Inter,"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.viewport{
 position:fixed;inset:0;display:grid;place-items:center;overflow:hidden;
 background:radial-gradient(70% 44% at 70% 12%,rgba(52,74,45,.11),transparent 70%),
 linear-gradient(180deg,#010504 0%,#020706 56%,#010403 100%);
}
.artboard{
 position:relative;width:430px;height:764px;overflow:hidden;isolation:isolate;
 transform-origin:center center;
 background:radial-gradient(285px 190px at 72% 12%,rgba(51,73,44,.13),transparent 72%),
 radial-gradient(245px 180px at 18% 88%,rgba(48,67,42,.08),transparent 72%),
 linear-gradient(180deg,#010504 0%,#020706 56%,#010403 100%);
}
.artboard::before{
 content:"";position:absolute;inset:0;pointer-events:none;opacity:.032;
 background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E");
 mix-blend-mode:soft-light;
}
.asset{position:absolute;display:block;object-fit:fill;pointer-events:none;user-select:none;image-rendering:auto;backface-visibility:hidden;transform:translateZ(0)}
.asset-back{left:19.649px;top:22.391px;width:47.067px;height:55.749px;}
.asset-title{left:75.855px;top:30.616px;width:201.52px;height:43.868px;}
.asset-subtitle{left:76.312px;top:66.259px;width:281.031px;height:25.59px;}
.asset-memory_card{left:23.762px;top:104.187px;width:377.906px;height:146.227px;}
.asset-empty_card{left:23.762px;top:268.236px;width:377.906px;height:100.988px;}
.asset-forget_button{left:23.762px;top:387.046px;width:143.943px;height:56.206px;}
.hotspot{position:absolute;z-index:10;border:0;padding:0;margin:0;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hotspot:focus-visible{outline:1.5px solid rgba(139,184,68,.58);outline-offset:-3px;border-radius:20px}
.hotspot:active{background:rgba(124,167,62,.035)}
.toast{
 position:absolute;z-index:30;left:50%;bottom:16px;transform:translate(-50%,16px);
 opacity:0;pointer-events:none;color:#a9cb6c;font-size:12px;font-weight:600;white-space:nowrap;
 padding:9px 14px;border-radius:999px;border:1px solid rgba(167,193,147,.22);
 background:linear-gradient(180deg,rgba(21,29,24,.92),rgba(5,11,9,.96));
 box-shadow:0 12px 25px rgba(0,0,0,.52),0 0 14px rgba(112,148,68,.10),inset 0 1px 1px rgba(255,255,255,.12);
 backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:.18s ease;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div class="viewport">
<main class="artboard" id="artboard" aria-label="Экран памяти приложения 4, тёмная тема">
<img class="asset asset-back" src="4_memory_dark_assets_v1/back.png" alt="" draggable="false">
<img class="asset asset-title" src="4_memory_dark_assets_v1/title.png" alt="" draggable="false">
<img class="asset asset-subtitle" src="4_memory_dark_assets_v1/subtitle.png" alt="" draggable="false">
<img class="asset asset-memory_card" src="4_memory_dark_assets_v1/memory_card.png" alt="" draggable="false">
<img class="asset asset-empty_card" src="4_memory_dark_assets_v1/empty_card.png" alt="" draggable="false">
<img class="asset asset-forget_button" src="4_memory_dark_assets_v1/forget_button.png" alt="" draggable="false">
<button class="hotspot" data-action="back" aria-label="Назад" style="left:19.649px;top:22.391px;width:47.067px;height:55.749px"></button>
<button class="hotspot" data-action="memory" aria-label="AI-память" style="left:23.762px;top:104.187px;width:377.906px;height:146.227px"></button>
<button class="hotspot" data-action="empty_state" aria-label="Список устойчивых фактов" style="left:23.762px;top:268.236px;width:377.906px;height:100.988px"></button>
<button class="hotspot" data-action="forget_all" aria-label="Забыть всё" style="left:23.762px;top:387.046px;width:143.943px;height:56.206px"></button>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
</main>
</div>
<script>
const artboard=document.getElementById('artboard');
function fit(){const k=Math.min(innerWidth/430,innerHeight/764);artboard.style.transform=`scale(${k})`;}
addEventListener('resize',fit,{passive:true});fit();
const labels={
 back:'Назад',
 memory:'AI-память',
 empty_state:'Устойчивых фактов пока нет',
 forget_all:'Забыть всё'
};
const toast=document.getElementById('toast');let timer;
document.querySelectorAll('.hotspot').forEach(btn=>btn.addEventListener('click',()=>{
 toast.textContent=labels[btn.dataset.action]||'';
 toast.classList.add('show');
 clearTimeout(timer);
 timer=setTimeout(()=>toast.classList.remove('show'),1200);
}));
</script>
</body>
</html>
