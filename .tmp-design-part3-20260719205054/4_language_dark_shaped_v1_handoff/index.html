<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>4 — Язык — Soft Glass Dark</title>
<style>
*{box-sizing:border-box}
html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#020706; }
body { font-family: Inter, "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.viewport {
  position:fixed; inset:0; display:grid; place-items:center; overflow:hidden;
  background:
    radial-gradient(68% 44% at 70% 14%, rgba(55,78,47,.11), transparent 70%),
    linear-gradient(180deg, #010504 0%, #020706 56%, #010403 100%);
}
.artboard {
  position:relative; width:430px; height:645px; overflow:hidden; isolation:isolate;
  transform-origin:center center;
  background:
    radial-gradient(280px 200px at 72% 14%, rgba(55,78,47,.13), transparent 72%),
    radial-gradient(220px 170px at 20% 86%, rgba(46,64,40,.09), transparent 72%),
    linear-gradient(180deg, #010504 0%, #020706 56%, #010403 100%);
}
.artboard::before {
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E");
  mix-blend-mode:soft-light;
}
.asset {
  position:absolute; display:block; object-fit:fill; user-select:none; pointer-events:none;
  image-rendering:auto; backface-visibility:hidden; transform:translateZ(0);
}
.asset-back{left:13.018px;top:15.537px;width:36.533px;height:36.533px;}
.asset-title{left:63.828px;top:22.256px;width:68.447px;height:31.494px;}
.asset-interface_label{left:22.676px;top:74.326px;width:165.869px;height:22.256px;}
.asset-current_lang_card{left:15.117px;top:95.322px;width:399.766px;height:67.188px;}
.asset-available_label{left:21.836px;top:165.029px;width:160.83px;height:24.355px;}
.asset-languages_card{left:15.117px;top:185.186px;width:399.766px;height:409.844px;}
.asset-footer_info{left:20.996px;top:609.727px;width:18.477px;height:19.316px;}
.asset-footer_text{left:47.031px;top:610.146px;width:337.197px;height:20.156px;}
.hotspot {
  position:absolute; z-index:10; border:0; padding:0; margin:0; background:transparent; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.hotspot:focus-visible {
  outline:1.5px solid rgba(139,184,68,.58); outline-offset:-3px; border-radius:20px;
}
.hotspot:active { background:rgba(124,167,62,.04); }
.toast {
  position:absolute; z-index:30; left:50%; bottom:16px; transform:translate(-50%,16px); opacity:0;
  pointer-events:none; color:#a9cb6c; font-size:12px; font-weight:600; white-space:nowrap;
  padding:9px 14px; border-radius:999px; border:1px solid rgba(167,193,147,.22);
  background:linear-gradient(180deg, rgba(21,29,24,.92), rgba(5,11,9,.96));
  box-shadow:0 12px 25px rgba(0,0,0,.52), 0 0 14px rgba(112,148,68,.10), inset 0 1px 1px rgba(255,255,255,.12);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  transition:opacity .18s ease, transform .18s ease;
}
.toast.show { opacity:1; transform:translate(-50%,0); }
</style>
</head>
<body>
<div class="viewport">
  <main class="artboard" id="artboard" aria-label="Экран выбора языка приложения 4, тёмная тема">
    <img class="asset asset-back" src="assets/back.png" alt="" draggable="false">
<img class="asset asset-title" src="assets/title.png" alt="" draggable="false">
<img class="asset asset-interface_label" src="assets/interface_label.png" alt="" draggable="false">
<img class="asset asset-current_lang_card" src="assets/current_lang_card.png" alt="" draggable="false">
<img class="asset asset-available_label" src="assets/available_label.png" alt="" draggable="false">
<img class="asset asset-languages_card" src="assets/languages_card.png" alt="" draggable="false">
<img class="asset asset-footer_info" src="assets/footer_info.png" alt="" draggable="false">
<img class="asset asset-footer_text" src="assets/footer_text.png" alt="" draggable="false">
    <button class="hotspot" data-action="back" aria-label="Назад" style="left:13.018px;top:15.537px;width:36.533px;height:36.533px"></button>
<button class="hotspot" data-action="current_language" aria-label="Текущий язык" style="left:15.117px;top:95.322px;width:399.766px;height:67.188px"></button>
<button class="hotspot" data-action="available_languages" aria-label="Список языков" style="left:15.117px;top:185.186px;width:399.766px;height:409.844px"></button>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>
</div>

<script>
const artboard = document.getElementById('artboard');
function fit() {
  const s = Math.min(innerWidth / 430, innerHeight / 645);
  artboard.style.transform = `scale(${s})`;
}
addEventListener('resize', fit, { passive:true });
fit();

const labels = {
  back: 'Назад',
  current_language: 'Текущий язык: Русский',
  available_languages: 'Список доступных языков'
};
const toast = document.getElementById('toast');
let timer;
document.querySelectorAll('.hotspot').forEach(btn => btn.addEventListener('click', () => {
  toast.textContent = labels[btn.dataset.action] || '';
  toast.classList.add('show');
  clearTimeout(timer);
  timer = setTimeout(() => toast.classList.remove('show'), 1200);
}));
</script>
</body>
</html>
