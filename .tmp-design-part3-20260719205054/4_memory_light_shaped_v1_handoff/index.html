<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>4 — Что 4 знает обо мне — Soft Glass Light</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3f0e8}
body{font-family:Inter,"SF Pro Text",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.viewport{
 position:fixed;inset:0;display:grid;place-items:center;overflow:hidden;
 background:radial-gradient(70% 44% at 70% 10%,rgba(188,206,121,.12),transparent 72%),
 linear-gradient(180deg,#f5f3ee 0%,#efede7 100%);
}
.artboard{
 position:relative;width:430px;height:764px;overflow:hidden;isolation:isolate;
 transform-origin:center center;
 background:radial-gradient(285px 190px at 72% 10%,rgba(188,206,121,.10),transparent 72%),
 radial-gradient(245px 180px at 18% 88%,rgba(184,198,140,.07),transparent 72%),
 linear-gradient(180deg,#f5f3ee 0%,#efede7 100%);
}
.artboard::before{
 content:"";position:absolute;inset:0;pointer-events:none;opacity:.022;
 background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter id='n'/%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E");
 mix-blend-mode:multiply;
}
.asset{position:absolute;display:block;object-fit:fill;pointer-events:none;user-select:none;image-rendering:auto;backface-visibility:hidden;transform:translateZ(0)}
.asset-back{left:16.908px;top:36.1px;width:46.153px;height:49.352px;}
.asset-title{left:79.511px;top:47.981px;width:202.434px;height:30.616px;}
.asset-subtitle{left:81.796px;top:77.226px;width:271.435px;height:20.106px;}
.asset-memory_card{left:17.821px;top:113.783px;width:388.417px;height:164.049px;}
.asset-empty_card{left:17.821px;top:298.395px;width:388.417px;height:78.14px;}
.asset-forget_button{left:17.821px;top:398.47px;width:104.644px;height:49.352px;}
.hotspot{position:absolute;z-index:10;border:0;padding:0;margin:0;background:transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hotspot:focus-visible{outline:1.5px solid rgba(120,162,55,.55);outline-offset:-3px;border-radius:20px}
.hotspot:active{background:rgba(120,162,55,.03)}
.toast{
 position:absolute;z-index:30;left:50%;bottom:16px;transform:translate(-50%,16px);
 opacity:0;pointer-events:none;color:#58742f;font-size:12px;font-weight:600;white-space:nowrap;
 padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.95);
 background:rgba(255,255,255,.76);
 box-shadow:0 10px 24px rgba(109,104,84,.14),inset 0 1px 1px rgba(255,255,255,.98);
 backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:.18s ease;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div class="viewport">
<main class="artboard" id="artboard" aria-label="Экран памяти приложения 4, светлая тема">
<img class="asset asset-back" src="4_memory_light_assets_v1/back.png" alt="" draggable="false">
<img class="asset asset-title" src="4_memory_light_assets_v1/title.png" alt="" draggable="false">
<img class="asset asset-subtitle" src="4_memory_light_assets_v1/subtitle.png" alt="" draggable="false">
<img class="asset asset-memory_card" src="4_memory_light_assets_v1/memory_card.png" alt="" draggable="false">
<img class="asset asset-empty_card" src="4_memory_light_assets_v1/empty_card.png" alt="" draggable="false">
<img class="asset asset-forget_button" src="4_memory_light_assets_v1/forget_button.png" alt="" draggable="false">
<button class="hotspot" data-action="back" aria-label="Назад" style="left:16.908px;top:36.1px;width:46.153px;height:49.352px"></button>
<button class="hotspot" data-action="memory" aria-label="AI-память" style="left:17.821px;top:113.783px;width:388.417px;height:164.049px"></button>
<button class="hotspot" data-action="empty_state" aria-label="Список устойчивых фактов" style="left:17.821px;top:298.395px;width:388.417px;height:78.14px"></button>
<button class="hotspot" data-action="forget_all" aria-label="Забыть всё" style="left:17.821px;top:398.47px;width:104.644px;height:49.352px"></button>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
</main>
</div>
<script>
const artboard=document.getElementById('artboard');
function fit(){const k=Math.min(innerWidth/430,innerHeight/764);artboard.style.transform=`scale(${k})`;}
addEventListener('resize',fit,{passive:true});fit();
const labels={
 back:'Назад',
 memory:'AI-память',
 empty_state:'Устойчивых фактов пока нет',
 forget_all:'Забыть всё'
};
const toast=document.getElementById('toast');let timer;
document.querySelectorAll('.hotspot').forEach(btn=>btn.addEventListener('click',()=>{
 toast.textContent=labels[btn.dataset.action]||'';
 toast.classList.add('show');
 clearTimeout(timer);
 timer=setTimeout(()=>toast.classList.remove('show'),1200);
}));
</script>
</body>
</html>
